name: 66 - Label PR Automatically
# This workflow labels a PR based on whether it has documentation changes.
# Exam Tip: Labeling helps organize and prioritize PRs.

on:
  pull_request:

jobs:
  labeler:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/labeler@v5
        with:
          # Configuration is typically in .github/labeler.yml
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true
          
      # Alternative using github-script
      - name: Add 'bug' label if title contains 'fix'
        if: contains(github.event.pull_request.title, 'fix')
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['bug']
            })
