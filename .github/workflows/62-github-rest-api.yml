name: 62 - GitHub REST API
# This workflow shows how to call the GitHub REST API using 'curl'.
# Exam Tip: Use the 'GITHUB_TOKEN' for authentication via the Authorization header.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rest-api:
    runs-on: ubuntu-latest
    steps:
      - name: List Repository Files
        run: |
          curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/vnd.github.v3+json" \
               "https://api.github.com/repos/${{ github.repository }}/contents"  ## list repo files not topics
