name: 64 - Create Issue Automatically
# This workflow demonstrates creating an issue when a build fails.
# Exam Tip: Use 'if: failure()' to trigger automation on errors.

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Simulate Build Failure
        run: exit 1
        
  report-failure:
    needs: build
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Build Failure in ${context.sha}`,
              body: `Workflow run: ${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            })
